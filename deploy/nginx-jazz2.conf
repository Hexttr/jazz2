# Статический вывод Next.js (output: export) в /var/www/jazz2/out
# Слушает только порт 8080 — не пересекается с superava.ru (80/443).

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /var/www/jazz2/out;
    index index.html;

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
